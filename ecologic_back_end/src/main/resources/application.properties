spring.datasource.url=jdbc:postgresql://db.vkffpxctoszpdykhjxse.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=EcoLogic123!
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================================================
# CONFIGURACOES DO JPA / HIBERNATE
# ===============================================================

# 'update' cria ou atualiza as tabelas automaticamente na primeira inicializacao
spring.jpa.hibernate.ddl-auto=create-drop

# Mostra o SQL gerado no console do IntelliJ
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialeto correto para o PostgreSQL moderno do Supabase
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
