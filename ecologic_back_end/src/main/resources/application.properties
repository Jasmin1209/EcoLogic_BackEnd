# ===============================================================
# CONFIGURACAO DO BANCO DE DADOS (NEON / POSTGRESQL)
# ===============================================================

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================================================
# CONFIGURACOES DO JPA / HIBERNATE
# ===============================================================

# 'update' cria ou atualiza as tabelas automaticamente na primeira inicializacao
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL gerado no console do IntelliJ
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialeto correto para o PostgreSQL moderno do Neon
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Render injeta a porta dinamicamente; no desenvolvimento local usa 8080
server.port=${PORT:8080}
